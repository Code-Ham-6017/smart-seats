<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>교실 자리배정 시스템 - 회원가입</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .register-container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #34495e;
            font-weight: bold;
            font-size: 14px;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 15px;
        }
        .flex-row {
            display: flex;
            gap: 10px;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn-submit:hover {
            background-color: #2980b9;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .login-link a {
            color: #3498db;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="register-container">
    <h2>🏫 교사 회원가입</h2>
    <form action="/register" method="POST">
        <div class="input-group">
            <label>아이디 (Username)</label>
            <input type="text" name="username" placeholder="사용할 아이디 입력" required>
        </div>
        <div class="input-group">
            <label>비밀번호 (Password)</label>
            <input type="password" name="password" placeholder="비밀번호 입력" required>
        </div>
        
        <input type="hidden" name="role" value="teacher">

        <hr style="border: 0; height: 1px; background: #eee; margin: 25px 0;">

        <div class="input-group">
            <label>🏫 소속 학교명</label>
            <input type="text" name="school" placeholder="예: 중앙초등학교" required>
        </div>

        <div class="flex-row">
            <div class="input-group" style="flex: 1;">
                <label>🔢 담당 학년</label>
                <input type="number" name="grade" min="1" max="6" placeholder="학년" required>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>🌱 담당 반</label>
                <input type="number" name="class_num" min="1" max="20" placeholder="반" required>
            </div>
        </div>

        <button type="submit" class="btn-submit">학급 등록 및 가입 완료 🚀</button>
    </form>

    <div class="login-link">
        이미 계정이 있으신가요? <a href="/login">로그인하기</a>
    </div>
</div>

</body>
</html>
